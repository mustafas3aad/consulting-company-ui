<!-- =============================================
     SECTION: Best Reasons For Choose Our Service
     ============================================= -->
<section class="reasons-section">
  <div class="container">
    <h3 class="reasons-title">{{ 'WHY_CHOOSE.REASONS_TITLE' | translate }}</h3>

    <div class="reasons-grid">
      <div class="reason-item" *ngFor="let item of reasons; let last = last">
        <div class="reason-icon" [innerHTML]="item.icon"></div>
        <p class="reason-text">{{ item.titleKey | translate }}</p>
        <div class="reason-divider" *ngIf="!last"></div>
      </div>
    </div>
  </div>
</section>

<!-- =============================================
     SECTION: Recent Case Studies
     ============================================= -->
<section class="case-studies-section">
  <div class="container">
    <div class="case-header">
      <h2 class="case-title">{{ 'WHY_CHOOSE.CASE_TITLE' | translate }}</h2>
      <a href="#" class="btn-primary">{{ 'WHY_CHOOSE.MORE_CASES' | translate }} <span>›</span></a>
    </div>

    <div class="case-grid">
      <div class="case-card" *ngFor="let study of caseStudies">
        <img [src]="study.image" [alt]="study.titleKey | translate" class="case-img" loading="lazy">
        <div class="case-overlay"></div>
        <div class="case-content">
          <span class="case-category">{{ study.categoryKey | translate }}</span>
          <h4 class="case-card-title">{{ study.titleKey | translate }}</h4>
        </div>
      </div>
    </div>
  </div>
</section>
