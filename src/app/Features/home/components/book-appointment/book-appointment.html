<section class="grow-section">

  <!-- الـ overlay على كامل الـ section -->
  <div class="grow-overlay"></div>

  <!-- LEFT — Stats -->
  <div class="grow-left">
    <div class="grow-content">

      <h2 class="grow-title">We Can Help You To Grow<br>Your Business</h2>

      <div class="stats">
        <div class="stat-row" *ngFor="let stat of stats">
          <div class="stat-left">
            <span class="stat-number">{{ stat.number }}</span>
            <span class="stat-label">{{ stat.label }}</span>
          </div>
          <div class="stat-divider"></div>
          <p class="stat-desc">{{ stat.desc }}</p>
        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT — Form -->
  <div class="grow-right">
    <div class="form-card">
      <p class="form-sub">Free Consultation</p>
      <h3 class="form-title">Book Appointment</h3>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <div class="field-group">
          <input type="text" formControlName="fullName" placeholder="Name"
            [class.is-invalid]="isInvalid('fullName')" />
          <div class="error-msg" *ngIf="isInvalid('fullName')">
            <span *ngIf="f['fullName'].errors?.['required']">Name is required.</span>
            <span *ngIf="f['fullName'].errors?.['maxlength']">Max 150 characters.</span>
          </div>
        </div>

        <div class="field-group">
          <input type="email" formControlName="email" placeholder="Email"
            [class.is-invalid]="isInvalid('email')" />
          <div class="error-msg" *ngIf="isInvalid('email')">
            <span *ngIf="f['email'].errors?.['required']">Email is required.</span>
            <span *ngIf="f['email'].errors?.['email']">Enter a valid email.</span>
          </div>
        </div>

        <div class="field-group">
          <input type="text" formControlName="companyName" placeholder="Company Name"
            [class.is-invalid]="isInvalid('companyName')" />
          <div class="error-msg" *ngIf="isInvalid('companyName')">
            <span *ngIf="f['companyName'].errors?.['required']">Company Name is required.</span>
          </div>
        </div>

        <div class="field-group">
          <div class="select-wrapper" [class.is-invalid]="isInvalid('serviceId')">
            <select formControlName="serviceId"
                    [class.is-invalid]="isInvalid('serviceId')"
                    [class.placeholder-selected]="!form.value.serviceId"
                    [attr.disabled]="servicesLoading() ? true : null">
              <option [ngValue]="null" disabled>
                {{ servicesLoading() ? 'Loading services...' : 'Select a Service' }}
              </option>
              <option *ngFor="let service of services()" [ngValue]="service.id">
                {{ service.name }}
              </option>
            </select>
            <span class="select-arrow">
              <svg *ngIf="!servicesLoading()" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
              <span *ngIf="servicesLoading()" class="spinner-sm"></span>
            </span>
          </div>
          <div class="error-msg" *ngIf="isInvalid('serviceId')">
            <span *ngIf="f['serviceId'].errors?.['required']">Please select a service.</span>
          </div>
        </div>

        <div class="field-group">
          <textarea formControlName="message" placeholder="Message" rows="5"></textarea>
        </div>

        <button type="submit" class="submit-btn" [disabled]="isLoading()">
          <span *ngIf="!isLoading()">Submit Now</span>
          <span *ngIf="isLoading()" class="spinner"></span>
        </button>

      </form>
    </div>
  </div>

</section>
